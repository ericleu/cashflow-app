name: Deploy Frontend

on:
  push:
    branches: [main]
    paths: [frontend/**]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Write CNAME
        run: echo "${{ secrets.CUSTOM_DOMAIN }}" > frontend/public/CNAME

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
